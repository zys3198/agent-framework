<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agent-framework</title>
<style>
  :root {
    --bg: #f6f3ee;
    --surface: #ffffff;
    --surface-2: #efeae0;
    --surface-3: #e7e0d3;
    --text: #221f1a;
    --text-soft: #4a443b;
    --muted: #968d80;
    --faint: #bbb2a3;
    --border: #e6dfd2;
    --border-strong: #d6cdbb;
    --accent: #c2410c;
    --accent-hover: #9a3409;
    --accent-soft: #fdf2e6;
    --accent-border: #f3c9a4;
    --tool-bg: #faf7f0;
    --shadow: 0 1px 2px rgba(60, 45, 20, 0.04), 0 4px 16px rgba(60, 45, 20, 0.05);
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ---------- sidebar ---------- */
  #sidebar {
    width: 264px;
    background: var(--surface-2);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  #sidebar header {
    padding: 18px 18px 14px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #sidebar header button {
    background: transparent;
    color: var(--muted);
    border: none;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  #sidebar header button:hover { background: var(--surface-3); color: var(--text); }
  #session-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  .session-item {
    position: relative;
    padding: 9px 11px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13.5px;
    margin-bottom: 2px;
    color: var(--text-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-left: 2px solid transparent;
    transition: background 0.15s, color 0.15s;
  }
  .session-item:hover { background: var(--surface-3); color: var(--text); }
  .session-item.active {
    background: var(--accent-soft);
    border-left-color: var(--accent);
    color: var(--text);
    font-weight: 500;
  }
  .session-del {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--faint);
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 5px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, background 0.15s;
  }
  .session-item:hover .session-del { opacity: 1; }
  .session-del:hover { background: #f6d6cd; color: #b91c1c; }
  .session-meta {
    font-size: 11px;
    color: var(--faint);
    margin-top: 3px;
    letter-spacing: 0.02em;
  }
  #sidebar-footer {
    padding: 12px 18px 16px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    line-height: 1.5;
  }
  #sidebar-footer #current-sid {
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ---------- main ---------- */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
  }
  #topbar {
    padding: 16px 28px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text);
  }
  #topbar span::before {
    content: "◆";
    color: var(--accent);
    margin-right: 8px;
    font-size: 12px;
    vertical-align: 1px;
  }
  #new-chat-btn {
    background: transparent;
    color: var(--text-soft);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  #new-chat-btn:hover {
    background: var(--surface);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ---------- messages ---------- */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  #messages:empty::before {
    content: "今天有什么可以帮你的";
    color: var(--faint);
    font-size: 14px;
    text-align: center;
    margin: auto;
    padding: 60px 20px;
    line-height: 1.7;
  }
  .role-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 6px;
  }
  .msg {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    max-width: 78%;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--accent-soft);
    color: var(--text);
    border: 1px solid var(--accent-border);
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }
  .msg.tool {
    align-self: flex-start;
    background: var(--tool-bg);
    color: var(--text-soft);
    border: 1px dashed var(--border-strong);
    font-family: "SF Mono", "Cascadia Code", Consolas, monospace;
    font-size: 12.5px;
    line-height: 1.5;
    border-bottom-left-radius: 4px;
    max-width: 88%;
  }

  .typing {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    padding: 16px 20px;
    font-size: 14px;
    color: var(--muted);
    box-shadow: var(--shadow);
  }
  .typing::before {
    content: "·  ·  ·";
    letter-spacing: 0.3em;
    color: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* ---------- input ---------- */
  #input-area {
    padding: 14px 28px 22px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  #input-area > div {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  #input {
    flex: 1;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    border-radius: 14px;
    padding: 13px 18px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
    box-shadow: var(--shadow);
  }
  #input::placeholder { color: var(--faint); }
  #input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  #send {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 0 24px;
    height: 48px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
  }
  #send:hover { background: var(--accent-hover); }
  #send:active { transform: scale(0.97); }
  #send:disabled { background: var(--faint); cursor: not-allowed; }

  /* ---------- scrollbar ---------- */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 720px) {
    #sidebar { display: none; }
    #messages, #input-area > div { max-width: 100%; }
    .msg { max-width: 92%; }
    #messages, #input-area { padding-left: 16px; padding-right: 16px; }
    #topbar { padding: 14px 16px; }
  }
</style>
</head>
<body>

<div id="sidebar">
  <header>
    <span>Sessions</span>
    <button id="refresh-btn" title="Refresh session list">⟳</button>
  </header>
  <div id="session-list"></div>
  <div id="sidebar-footer">
    <div>session</div>
    <div id="current-sid"></div>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <span>agent-framework</span>
    <button id="new-chat-btn">+ new chat</button>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <div>
      <input id="input" type="text" placeholder="ask anything…" autocomplete="off">
      <button id="send">Send</button>
    </div>
  </div>
</div>

<script>
"use strict";

function getOrCreateSid() {
  let sid = localStorage.getItem("session_id");
  if (!sid) {
    sid = (crypto && crypto.randomUUID)
      ? crypto.randomUUID()
      : "sid-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
    localStorage.setItem("session_id", sid);
  }
  return sid;
}

function shortSid(s) {
  return s.length > 12 ? s.slice(0, 8) + "…" + s.slice(-4) : s;
}
function setFooterTitle(name) {
  document.getElementById("current-sid").textContent = name || "新会话";
}

var currentSid = getOrCreateSid();
setFooterTitle("新会话");

var messagesEl = document.getElementById("messages");
var inputEl = document.getElementById("input");
var sendBtn = document.getElementById("send");
var sessionListEl = document.getElementById("session-list");

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(role, content) {
  var wrap = document.createElement("div");
  var label = document.createElement("div");
  label.className = "role-label";
  label.textContent = role;
  var body = document.createElement("div");
  body.className = "msg " + role;
  body.textContent = content;
  wrap.appendChild(label);
  wrap.appendChild(body);
  messagesEl.appendChild(wrap);
  scrollBottom();
}

function addTyping() {
  var el = document.createElement("div");
  el.className = "typing";
  el.id = "typing-indicator";
  el.textContent = "";
  messagesEl.appendChild(el);
  scrollBottom();
}

function removeTyping() {
  var el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

async function sendChat() {
  var text = inputEl.value.trim();
  if (!text) return;
  addMessage("user", text);
  inputEl.value = "";
  sendBtn.disabled = true;
  addTyping();
  try {
    var resp = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: currentSid, input: text })
    });
    removeTyping();
    if (resp.status === 503) {
      addMessage("assistant", "[error] DEEPSEEK_API_KEY not configured on the server.");
      return;
    }
    if (!resp.ok) {
      addMessage("assistant", "[error] server returned " + resp.status);
      return;
    }
    var data = await resp.json();
    addMessage("assistant", data.answer);
    /* if server generated a new sid, adopt it */
    if (data.session_id && data.session_id !== currentSid) {
      currentSid = data.session_id;
      localStorage.setItem("session_id", currentSid);
      setFooterTitle("新会话");
    }
    loadSessions();
  } catch (e) {
    removeTyping();
    addMessage("assistant", "[error] " + e.message);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener("click", sendChat);
inputEl.addEventListener("keydown", function (e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});

document.getElementById("new-chat-btn").addEventListener("click", function () {
  localStorage.removeItem("session_id");
  currentSid = getOrCreateSid();
  setFooterTitle("新会话");
  messagesEl.innerHTML = "";
  inputEl.focus();
});

async function loadSessions() {
  try {
    var resp = await fetch("/sessions");
    if (!resp.ok) return;
    var rows = await resp.json();
    sessionListEl.innerHTML = "";
    rows.forEach(function (row) {
      var item = document.createElement("div");
      item.className = "session-item";
      if (row.id === currentSid) item.classList.add("active");
      var title = document.createElement("div");
      title.textContent = row.title || shortSid(row.id);
      var meta = document.createElement("div");
      meta.className = "session-meta";
      meta.textContent = (row.fsm_state || "IDLE") + " . todos:" + (row.todo_count || 0);
      item.appendChild(title);
      item.appendChild(meta);
      var del = document.createElement("button");
      del.className = "session-del";
      del.title = "删除会话";
      del.textContent = "×";
      del.addEventListener("click", function (ev) {
        ev.stopPropagation();
        if (!confirm("删除此会话？")) return;
        fetch("/sessions/" + encodeURIComponent(row.id), { method: "DELETE" })
          .then(function (r) {
            if (!r.ok) return;
            if (row.id === currentSid) {
              localStorage.removeItem("session_id");
              currentSid = getOrCreateSid();
              messagesEl.innerHTML = "";
              setFooterTitle("新会话");
            }
            loadSessions();
          })
          .catch(function () {});
      });
      item.appendChild(del);
      item.addEventListener("click", function () { loadSessionDetail(row.id); });
      sessionListEl.appendChild(item);
    });
    var cur = rows.find(function (r) { return r.id === currentSid; });
    setFooterTitle(cur ? cur.title : "新会话");
  } catch (e) {
    /* ignore */
  }
}

document.getElementById("refresh-btn").addEventListener("click", loadSessions);

async function loadSessionDetail(sid) {
  try {
    var resp = await fetch("/sessions/" + encodeURIComponent(sid));
    if (!resp.ok) return;
    var detail = await resp.json();
    currentSid = sid;
    localStorage.setItem("session_id", sid);
    setFooterTitle("新会话");
    messagesEl.innerHTML = "";
    var msgs = detail.messages || [];
    msgs.forEach(function (m) {
      var role = m.role || "assistant";
      addMessage(role, m.content || "");
    });
    loadSessions();
    inputEl.focus();
  } catch (e) {
    /* ignore */
  }
}

loadSessions();
inputEl.focus();
</script>

</body>
</html>
