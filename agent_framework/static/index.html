<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agent-framework chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    display: flex;
    height: 100vh;
  }

  /* ---------- sidebar ---------- */
  #sidebar {
    width: 240px;
    background: #1e1e2e;
    color: #cdd6f4;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #313244;
    flex-shrink: 0;
  }
  #sidebar header {
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 600;
    border-bottom: 1px solid #313244;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #sidebar header button {
    background: #89b4fa;
    color: #1e1e2e;
    border: none;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
  }
  #sidebar header button:hover { background: #74a0f7; }
  #session-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .session-item {
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-item:hover { background: #313244; }
  .session-item.active { background: #45475a; }
  .session-meta {
    font-size: 11px;
    color: #6c7086;
    margin-top: 2px;
  }
  #sidebar-footer {
    padding: 10px 16px;
    font-size: 11px;
    color: #6c7086;
    border-top: 1px solid #313244;
    word-break: break-all;
  }

  /* ---------- main chat ---------- */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  #topbar {
    padding: 12px 20px;
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #new-chat-btn {
    background: #4a9eff;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  #new-chat-btn:hover { background: #3a8eef; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #4a9eff;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #fff;
    color: #1a1a1a;
    border: 1px solid #e0e0e0;
    border-bottom-left-radius: 4px;
  }
  .msg.tool {
    align-self: flex-start;
    background: #f0f9eb;
    color: #5a7a3a;
    border: 1px dashed #b0d090;
    font-family: "Cascadia Code", Consolas, monospace;
    font-size: 13px;
    border-bottom-left-radius: 4px;
  }
  .msg.role-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 4px;
  }

  #input-area {
    padding: 16px 20px;
    background: #fff;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 10px;
  }
  #input {
    flex: 1;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
  }
  #input:focus { border-color: #4a9eff; }
  #send {
    background: #4a9eff;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 22px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  #send:hover { background: #3a8eef; }
  #send:disabled { background: #b0b0b0; cursor: not-allowed; }

  .typing {
    align-self: flex-start;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    color: #999;
  }

  /* ---------- responsive ---------- */
  @media (max-width: 640px) {
    #sidebar { display: none; }
    .msg { max-width: 90%; }
  }
</style>
</head>
<body>

<div id="sidebar">
  <header>
    <span>Sessions</span>
    <button id="refresh-btn" title="Refresh session list">reload</button>
  </header>
  <div id="session-list"></div>
  <div id="sidebar-footer">
    <div>session:</div>
    <div id="current-sid" style="color:#a6adc8;"></div>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <span>agent-framework</span>
    <button id="new-chat-btn">+ new chat</button>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Type a message..." autocomplete="off">
    <button id="send">Send</button>
  </div>
</div>

<script>
"use strict";

/* ---------- session id management ---------- */
function getOrCreateSid() {
  let sid = localStorage.getItem("session_id");
  if (!sid) {
    sid = (crypto && crypto.randomUUID)
      ? crypto.randomUUID()
      : "sid-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
    localStorage.setItem("session_id", sid);
  }
  return sid;
}

var currentSid = getOrCreateSid();
document.getElementById("current-sid").textContent = currentSid;

/* ---------- DOM helpers ---------- */
var messagesEl = document.getElementById("messages");
var inputEl = document.getElementById("input");
var sendBtn = document.getElementById("send");
var sessionListEl = document.getElementById("session-list");

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(role, content) {
  var wrap = document.createElement("div");
  var label = document.createElement("div");
  label.className = "role-label";
  label.textContent = role;
  var body = document.createElement("div");
  body.className = "msg " + role;
  body.textContent = content;
  wrap.appendChild(label);
  wrap.appendChild(body);
  messagesEl.appendChild(wrap);
  scrollBottom();
}

function addTyping() {
  var el = document.createElement("div");
  el.className = "typing";
  el.id = "typing-indicator";
  el.textContent = "thinking...";
  messagesEl.appendChild(el);
  scrollBottom();
}

function removeTyping() {
  var el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

/* ---------- send a chat message ---------- */
async function sendChat() {
  var text = inputEl.value.trim();
  if (!text) return;
  addMessage("user", text);
  inputEl.value = "";
  sendBtn.disabled = true;
  addTyping();
  try {
    var resp = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: currentSid, input: text })
    });
    removeTyping();
    if (resp.status === 503) {
      addMessage("assistant", "[error] DEEPSEEK_API_KEY not configured on the server.");
      return;
    }
    if (!resp.ok) {
      addMessage("assistant", "[error] server returned " + resp.status);
      return;
    }
    var data = await resp.json();
    addMessage("assistant", data.answer);
    /* if server generated a new sid, adopt it */
    if (data.session_id && data.session_id !== currentSid) {
      currentSid = data.session_id;
      localStorage.setItem("session_id", currentSid);
      document.getElementById("current-sid").textContent = currentSid;
    }
    loadSessions();
  } catch (e) {
    removeTyping();
    addMessage("assistant", "[error] " + e.message);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener("click", sendChat);
inputEl.addEventListener("keydown", function (e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});

/* ---------- new chat ---------- */
document.getElementById("new-chat-btn").addEventListener("click", function () {
  localStorage.removeItem("session_id");
  currentSid = getOrCreateSid();
  document.getElementById("current-sid").textContent = currentSid;
  messagesEl.innerHTML = "";
  inputEl.focus();
});

/* ---------- sessions sidebar ---------- */
async function loadSessions() {
  try {
    var resp = await fetch("/sessions");
    if (!resp.ok) return;
    var rows = await resp.json();
    sessionListEl.innerHTML = "";
    rows.forEach(function (row) {
      var item = document.createElement("div");
      item.className = "session-item";
      if (row.id === currentSid) item.classList.add("active");
      var title = document.createElement("div");
      title.textContent = row.id;
      var meta = document.createElement("div");
      meta.className = "session-meta";
      meta.textContent = (row.fsm_state || "IDLE") + " . todos:" + (row.todo_count || 0);
      item.appendChild(title);
      item.appendChild(meta);
      item.addEventListener("click", function () { loadSessionDetail(row.id); });
      sessionListEl.appendChild(item);
    });
  } catch (e) {
    /* ignore */
  }
}

document.getElementById("refresh-btn").addEventListener("click", loadSessions);

async function loadSessionDetail(sid) {
  try {
    var resp = await fetch("/sessions/" + encodeURIComponent(sid));
    if (!resp.ok) return;
    var detail = await resp.json();
    currentSid = sid;
    localStorage.setItem("session_id", sid);
    document.getElementById("current-sid").textContent = sid;
    messagesEl.innerHTML = "";
    var msgs = detail.messages || [];
    msgs.forEach(function (m) {
      var role = m.role || "assistant";
      addMessage(role, m.content || "");
    });
    loadSessions();
    inputEl.focus();
  } catch (e) {
    /* ignore */
  }
}

/* ---------- init ---------- */
loadSessions();
inputEl.focus();
</script>

</body>
</html>
